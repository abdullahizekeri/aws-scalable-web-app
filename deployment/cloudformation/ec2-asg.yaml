AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 ASG Stack - Scalable Web App'

Parameters:
  ProjectName:
    Type: String
    Default: scalable-web-app
  InstanceType:
    Type: String
    Default: t3.micro
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-ec2-role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${ProjectName}-ec2-profile
      Roles:
        - !Ref EC2InstanceRole

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${ProjectName}-lt
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !ImportValue
              Fn::Sub: ${ProjectName}-EC2SecurityGroup
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            yum install -y httpd amazon-cloudwatch-agent
            systemctl start httpd
            systemctl enable httpd

            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/instance-id)
            AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/placement/availability-zone)

            cat > /var/www/html/index.html << EOF
            <!DOCTYPE html>
            <html>
            <head>
              <title>AWS Scalable Web App</title>
              <style>
                body { font-family: Arial; background: #232F3E; color: white;
                       display: flex; justify-content: center; align-items: center;
                       height: 100vh; margin: 0; }
                .box { background: rgba(255,153,0,0.2); padding: 40px;
                       border-radius: 12px; text-align: center;
                       border: 2px solid #FF9900; max-width: 500px; }
                h1 { color: #FF9900; }
                .badge { background: #FF9900; color: #232F3E; padding: 5px 15px;
                         border-radius: 20px; font-weight: bold; margin-top: 15px;
                         display: inline-block; }
              </style>
            </head>
            <body>
              <div class="box">
                <h1>🚀 AWS Scalable Web App</h1>
                <p>Instance ID: <strong>$INSTANCE_ID</strong></p>
                <p>Availability Zone: <strong>$AZ</strong></p>
                <div class="badge">SAA-C03 Graduation Project</div>
              </div>
            </body>
            </html>
            EOF

            mkdir -p /var/www/html/health
            echo '{"status":"healthy"}' > /var/www/html/health/index.html

        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${ProjectName}-ec2

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub ${ProjectName}-asg
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: '2'
      MaxSize: '6'
      DesiredCapacity: '2'
      VPCZoneIdentifier:
        - !ImportValue
          Fn::Sub: ${ProjectName}-PrivateSubnet1
        - !ImportValue
          Fn::Sub: ${ProjectName}-PrivateSubnet2
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-asg
          PropagateAtLaunch: true

  ScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 50.0

Outputs:
  AutoScalingGroupName:
    Value: !Ref AutoScalingGroup
    Export:
      Name: !Sub ${ProjectName}-ASGName

  LaunchTemplateId:
    Value: !Ref LaunchTemplate
    Export:
      Name: !Sub ${ProjectName}-LaunchTemplateId